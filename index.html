<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sneaky Sasquatch Inventory</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#495e2d;
    color:white;
    margin:0;
    padding:20px;
}
  
.title-image{
    display:block;
    margin:20px auto;
    width:100%;
    max-width:500px;
    height:auto;
}

/* HEADER (FIX) */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 15px 5px 15px;
    gap:10px;
}

/* LEFT SIDE */
.left-controls{
    display:flex;
    align-items:center;
    gap:10px;
}

/* RIGHT SIDE */
.right-controls{
    display:flex;
    gap:10px;
    align-items:center;
}

/* SEARCH */
.search-wrapper{
    display:flex;
    align-items:center;
    gap:8px;
}

.search-toggle{
    width:50px;
    height:50px;
    border:none;
    background:none;
    color:white;
    font-size:26px;
    cursor:pointer;
}

.search-input{
    width:0;
    opacity:0;
    padding:0;
    border:none;
    border-radius:6px;
    font-size:16px;
    transition:0.25s ease;
    background:white;
    color:black;
}

.search-input.active{
    width:180px;
    opacity:1;
    padding:10px;
}

/* FILTER */
.filter-wrapper{
    position:relative;
}

.filter-btn{
    width:50px;
    height:50px;
    border:none;
    background:none;
    color:white;
    font-size:28px;
    cursor:pointer;
}

.filter-menu{
    display:none;
    position:absolute;
    top:55px;
    left:0;
    background:none;
}

.filter-menu button{
    display:block;
    width:160px;
    padding:10px;
    border:none;
    background:none;
    color:white;
    text-align:left;
    cursor:pointer;
}

.filter-menu button:hover{
    background:#3b4c24;
}

/* RIGHT BUTTONS */
.right-controls button{
    width:50px;
    height:50px;
    border:none;
    background:none;
    color:white;
    font-size:26px;
    cursor:pointer;
}

.reset{
    border-radius:50%;
    font-size:34px;
}

/* ITEM */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px auto;
    width:100%;
    max-width:700px;
}

.left-box{
    background:white;
    padding:8px 12px;
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:12px;
    flex:1;
    min-width:0;
    color:black;
}

.count{
    width:30px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.controls{
    display:flex;
    gap:8px;
    margin-left:10px;
}

button.action{
    width:42px;
    height:42px;
    border:none;
    border-radius:10px;
    font-size:30px;
    cursor:pointer;
    background:none;
    color:white;
}

button.action:active{
    transform:scale(0.9);
}

/* CATEGORY */
.category-title{
    width:100%;
    max-width:700px;
    margin:18px auto 8px auto;
    font-size:16px;
    opacity:0.9;
}

/* MOBILE */
@media (max-width:600px){

    .header{
        flex-wrap:wrap;
        gap:8px;
    }

    .search-input.active{
        width:140px;
    }

    .item{
        max-width:95%;
    }

    button.action{
        width:46px;
        height:46px;
        font-size:32px;
    }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="left-controls">

        <div class="filter-wrapper">
            <button class="filter-btn" onclick="toggleMenu()">⚙️</button>
            <div class="filter-menu" id="menu">
                <button onclick="setSort('name')">alphabetical</button>
                <button onclick="setSort('min')">min</button>
                <button onclick="setSort('max')">max</button>
                <button onclick="setSort('store')">store</button>
            </div>
        </div>

        <div class="search-wrapper">
            <button class="search-toggle" onclick="toggleSearch()">🔍</button>
            <input id="search" class="search-input" placeholder="search..." />
        </div>

    </div>

    <div class="right-controls">
        <button onclick="loadGameTrigger()">📂</button>
        <button onclick="saveGame()">💾</button>
        <button class="reset" onclick="resetAll()">↩</button>
    </div>

</div>

<input type="file" id="fileInput" style="display:none" onchange="loadGame(event)">
  
<img src="sneaky.png" class="title-image">

<div id="inventory"></div>

<script>

function toggleSearch(){
    const input = document.getElementById("search");
    input.classList.toggle("active");
    if(input.classList.contains("active")) input.focus();
}

function loadGameTrigger(){
    document.getElementById("fileInput").click();
}

const items = [
{ name:"lemon", category:"grocery store" },
{ name:"orange", category:"grocery store" },
{ name:"lime", category:"grocery store" },
{ name:"apple", category:"grocery store" },
{ name:"banana", category:"grocery store" },
{ name:"lettuce/cabbage", category:"grocery store" },
{ name:"canned soup", category:"grocery store" },
{ name:"canned pizza", category:"grocery store" },
{ name:"hot sauce", category:"grocery store" },
{ name:"ketchup", category:"grocery store" },
{ name:"mustard", category:"grocery store" },
{ name:"relish", category:"grocery store" },
{ name:"jam", category:"grocery store" },
{ name:"bbq sauce", category:"grocery store" },
{ name:"soy sauce", category:"grocery store" },
{ name:"mayonnaise", category:"grocery store" },
{ name:"milk", category:"grocery store" },
{ name:"orange juice", category:"grocery store" },
{ name:"frozen waffles", category:"grocery store" },

{ name:"pretzels", category:"gas station" },
{ name:"beef jerky", category:"gas station" },
{ name:"chips/crisps", category:"gas station" },
{ name:"candy", category:"gas station" },
{ name:"water bottle", category:"gas station" },
{ name:"orange soda", category:"gas station" },
{ name:"grape soda", category:"gas station" },
{ name:"chocolate milk", category:"gas station" },

{ name:"burger", category:"diner" },

{ name:"s'mores", category:"campsite" },
{ name:"sausage", category:"campsite" },
{ name:"avocado half", category:"campsite" },

{ name:"taco", category:"island" }
];

let sortMode = "name";
const inventory = document.getElementById("inventory");

function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setSort(mode){
    sortMode = mode;
    draw();
    document.getElementById("menu").style.display = "none";
}

function getCount(item){
    return Number(localStorage.getItem(item)||0);
}

function setCount(item,value){
    localStorage.setItem(item,value);
}

function renderItem(item){

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
        <div class="left-box">
            <span class="count">${getCount(item.name)}</span>
            <span>${item.name}</span>
        </div>
        <div class="controls">
            <button class="action">+</button>
            <button class="action">−</button>
        </div>
    `;

    row.querySelector(".controls button:nth-child(1)").onclick = ()=>{
        setCount(item.name, getCount(item.name)+1);
        draw();
    };

    row.querySelector(".controls button:nth-child(2)").onclick = ()=>{
        setCount(item.name, Math.max(0,getCount(item.name)-1));
        draw();
    };

    inventory.appendChild(row);
}

function draw(){

    inventory.innerHTML="";

    const filter = document.getElementById("search").value.toLowerCase();

    let list = [...items];

    list.sort((a,b)=>{
        const aCount = getCount(a.name);
        const bCount = getCount(b.name);

        if(sortMode==="name") return a.name.localeCompare(b.name);
        if(sortMode==="min") return aCount-bCount;
        if(sortMode==="max") return bCount-aCount;
        if(sortMode==="store"){
            if(a.category===b.category) return a.name.localeCompare(b.name);
            return a.category.localeCompare(b.category);
        }
    });

    list.forEach(item=>{
        if(!item.name.toLowerCase().includes(filter)) return;
        renderItem(item);
    });
}

function saveGame(){
    const data={};
    for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        data[k]=localStorage.getItem(k);
    }
    const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="save.json";
    a.click();
    URL.revokeObjectURL(url);
}

function loadGame(e){
    const file=e.target.files[0];
    const reader=new FileReader();
    reader.onload=function(ev){
        const data=JSON.parse(ev.target.result);
        localStorage.clear();
        for(const k in data){
            localStorage.setItem(k,data[k]);
        }
        draw();
    };
    reader.readAsText(file);
}

function resetAll(){
    localStorage.clear();
    draw();
}

document.getElementById("search").addEventListener("input",draw);
draw();

</script>

</body>
</html>
