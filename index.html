<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sneaky Sasquatch Inventory</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#495e2d;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
    box-sizing:border-box;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:stretch;
    margin:8px auto;
    width:55%;
}
  
 #search{
    display:flex;
    justify-content:space-between;
    align-items:stretch;
    margin:8px auto;
    width:55%;
    border-radius:5px;
}

.left-box {
    background:white;
    padding:8px 12px;
    border-radius:5px;
      display:flex;
    align-items:center;
    gap:12px;
    flex:1;
  color:black
}

.count{
    width:30px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.controls{
    display:flex;
    gap:8px;
    margin-left:10px;
}

button{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.minus{
    background:none;
    color:white;
    font-size: 35px;
}

.plus{
    background:none;
    color:white;
  font-size: 35px;
}

.reset{
    position:fixed;
    top:15px;
    right:15px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:none;
    color:white;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:none;
    cursor:pointer;
}
  
</style>

</head>

<body>

<img src="sneaky.png" alt="Sneaky Sasquatch Inventory" class="title-image">
<br>
<input id="search" placeholder="Search...">
<br>
<div id="inventory"></div>

<button class="reset" onclick="resetAll()">↩</button>

<script>

const items = [
{ name:"apple" },
{ name:"avocado" },
{ name:"banana" },
{ name:"bbq sauce" },
{ name:"beef jerky" },
{ name:"burger" },
{ name:"canned pizza" },
{ name:"canned soup" },
{ name:"candy" },
{ name:"chips" },
{ name:"chocolate milk" },
{ name:"frozen waffles" },
{ name:"grape soda" },
{ name:"hot sauce" },
{ name:"jam" },
{ name:"ketchup" },
{ name:"lemon" },
{ name:"lettuce" },
{ name:"lime" },
{ name:"milk" },
{ name:"mustard" },
{ name:"orange" },
{ name:"orange juice" },
{ name:"orange soda" },
{ name:"pretzels" },
{ name:"relish" },
{ name:"s'mores" },
{ name:"sausage" },
{ name:"soy sauce" },
{ name:"taco" },
{ name:"water" }
];

items.sort((a,b)=>a.name.localeCompare(b.name));

const inventory=document.getElementById("inventory");

function getCount(item){
    return Number(localStorage.getItem(item)||0);
}

function setCount(item,value){
    localStorage.setItem(item,value);
}

function draw(){

    inventory.innerHTML="";

    const filter=document.getElementById("search").value.toLowerCase();

    items.forEach(item=>{

        if(!item.name.toLowerCase().includes(filter)) return;

        const row=document.createElement("div");
        row.className="item";

        row.innerHTML=`
            <div class="left-box">
                <span class="count">${getCount(item.name)}</span>
                <span>${item.name}</span>
            </div>

            <div class="controls">
                <button class="plus">+</button>
                <button class="minus">−</button>
            </div>
        `;

        row.querySelector(".minus").onclick=()=>{

            let value=Math.max(0,getCount(item.name)-1);
            setCount(item.name,value);
            draw();

        };

        row.querySelector(".plus").onclick=()=>{

            let value=getCount(item.name)+1;
            setCount(item.name,value);
            draw();

        };

        inventory.appendChild(row);

    });

}

function resetAll(){

    if(confirm("Reset every item?")){

        localStorage.clear();
        draw();

    }

}

document.getElementById("search").addEventListener("input",draw);

draw();

</script>

</body>
</html>
