<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sneaky Sasquatch Inventory</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#495e2d;
    color:white;
    margin:0;
    padding:20px;
}

.title-image{
    display:block;
    margin: 30px auto;
    width: 500px;
    max-width: 80%;
}

/* FILTER */
.filter-wrapper{
    position:fixed;
    top:15px;
    left:15px;
    z-index:10;
}

.filter-btn{
    width:50px;
    height:50px;
    border-radius:10px;
    border:none;
    background:none;
    color:white;
    font-size:30px;
    cursor:pointer;
}

.filter-menu{
    display:none;
    position:absolute;
    top:55px;
    left:0;
    background:none;
}

.filter-menu button{
    display:block;
    width:160px;
    padding:10px;
    border:none;
    background:none;
    color:white;
    text-align:left;
    cursor:pointer;
    font-size:16px;
}

.filter-menu button:hover{
    background:#3b4c24;
}

/* SEARCH */
input{
    width:55%;
    display:block;
    margin: 10px auto 15px auto;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    box-sizing:border-box;
}

/* ITEM */
.item{
    display:flex;
    justify-content:space-between;
    align-items:stretch;
    margin:8px auto;
    width:55%;
}

.left-box{
    background:white;
    padding:8px 12px;
    border-radius:5px;
    display:flex;
    align-items:center;
    gap:12px;
    flex:1;
    color:black;
}

.count{
    width:30px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.controls{
    display:flex;
    gap:8px;
    margin-left:10px;
}

button.action{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    font-size:35px;
    cursor:pointer;
    background:none;
    color:white;
}

/* TOP RIGHT */
.top-right{
    position:fixed;
    top:15px;
    right:15px;
    display:flex;
    gap:10px;
    align-items:center;
}

.top-right button{
    width:55px;
    height:55px;
    border-radius:10px;
    background:none;
    color:white;
    font-size:28px;
    border:none;
    cursor:pointer;
}

.reset{
    width:55px;
    height:55px;
    border-radius:50%;
    background:none;
    color:white;
    font-size:40px;
    border:none;
    cursor:pointer;
}

/* CATEGORY */
.category-title{
    width:55%;
    margin:20px auto 10px auto;
    font-size:18px;
    padding-bottom:5px;
}
</style>

</head>

<body>

<!-- FILTER -->
<div class="filter-wrapper">
    <button class="filter-btn" onclick="toggleMenu()">⋯</button>
    <div class="filter-menu" id="menu">
        <button onclick="setSort('name')">alphabetical</button>
        <button onclick="setSort('min')">min</button>
        <button onclick="setSort('max')">max</button>
        <button onclick="setSort('store')">store</button>
    </div>
</div>

<!-- TOP RIGHT -->
<div class="top-right">
    <button onclick="loadGameTrigger()" title="import">⬆</button>
    <button onclick="saveGame()" title="export">⬇</button>
    <button class="reset" onclick="resetAll()" title="reset">↩</button>
</div>

<input type="file" id="fileInput" style="display:none" onchange="loadGame(event)">

<img src="sneaky.png" class="title-image">

<input id="search" placeholder="search...">

<div id="inventory"></div>

<script>

function loadGameTrigger(){
    document.getElementById("fileInput").click();
}

const items = [
{ name:"lemon", category:"grocery store" },
{ name:"orange", category:"grocery store" },
{ name:"lime", category:"grocery store" },
{ name:"apple", category:"grocery store" },
{ name:"banana", category:"grocery store" },
{ name:"lettuce/cabbage", category:"grocery store" },
{ name:"canned soup", category:"grocery store" },
{ name:"canned pizza", category:"grocery store" },
{ name:"hot sauce", category:"grocery store" },
{ name:"ketchup", category:"grocery store" },
{ name:"mustard", category:"grocery store" },
{ name:"relish", category:"grocery store" },
{ name:"jam", category:"grocery store" },
{ name:"bbq sauce", category:"grocery store" },
{ name:"soy sauce", category:"grocery store" },
{ name:"mayonnaise", category:"grocery store" },
{ name:"milk", category:"grocery store" },
{ name:"orange juice", category:"grocery store" },
{ name:"frozen waffles", category:"grocery store" },

{ name:"pretzels", category:"gas station" },
{ name:"beef jerky", category:"gas station" },
{ name:"chips/crisps", category:"gas station" },
{ name:"candy", category:"gas station" },
{ name:"water bottle", category:"gas station" },
{ name:"orange soda", category:"gas station" },
{ name:"grape soda", category:"gas station" },
{ name:"chocolate milk", category:"gas station" },

{ name:"burger", category:"diner" },

{ name:"s'mores", category:"campsite" },
{ name:"sausage", category:"campsite" },
{ name:"avocado half", category:"campsite" },

{ name:"taco", category:"island" }
];

let sortMode = "name";

const inventory = document.getElementById("inventory");

function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setSort(mode){
    sortMode = mode;
    updateMenuChecks();
    draw();
    document.getElementById("menu").style.display = "none";
}

function updateMenuChecks(){

    const modes = ["name","min","max","store"];

    modes.forEach(m=>{
        const btn = document.querySelector(`button[onclick="setSort('${m}')"]`);
        if(!btn) return;

        btn.textContent = btn.textContent.replace("» ","");

        if(m === sortMode){
            btn.textContent = "» " + btn.textContent;
        }
    });
}

function getCount(item){
    return Number(localStorage.getItem(item)||0);
}

function setCount(item,value){
    localStorage.setItem(item,value);
}

function renderItem(item){

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
        <div class="left-box">
            <span class="count">${getCount(item.name)}</span>
            <span>${item.name}</span>
        </div>

        <div class="controls">
            <button class="action plus">+</button>
            <button class="action minus">−</button>
        </div>
    `;

    row.querySelector(".minus").onclick = ()=>{
        setCount(item.name, Math.max(0, getCount(item.name)-1));
        draw();
    };

    row.querySelector(".plus").onclick = ()=>{
        setCount(item.name, getCount(item.name)+1);
        draw();
    };

    inventory.appendChild(row);
}

function draw(){

    inventory.innerHTML="";

    const filter = document.getElementById("search").value.toLowerCase();

    let list = [...items];

    list.sort((a,b)=>{

        const aCount = getCount(a.name);
        const bCount = getCount(b.name);

        if(sortMode === "name"){
            return a.name.localeCompare(b.name);
        }

        if(sortMode === "min"){
            return aCount - bCount;
        }

        if(sortMode === "max"){
            return bCount - aCount;
        }

        if(sortMode === "store"){
            if(a.category === b.category){
                return a.name.localeCompare(b.name);
            }
            return a.category.localeCompare(b.category);
        }

    });

    if(sortMode === "store"){

        let grouped = {};

        list.forEach(item=>{
            if(!item.name.toLowerCase().includes(filter)) return;

            if(!grouped[item.category]){
                grouped[item.category] = [];
            }

            grouped[item.category].push(item);
        });

        Object.keys(grouped).sort().forEach(cat=>{
            
            const title = document.createElement("div");
            title.className = "category-title";
            title.textContent = cat;

            inventory.appendChild(title);

            grouped[cat].forEach(renderItem);
        });

    } else {

        list.forEach(item=>{
            if(!item.name.toLowerCase().includes(filter)) return;
            renderItem(item);
        });
    }
}

/* SAVE / LOAD / RESET */

function saveGame(){

    const data = {};

    for(let i=0;i<localStorage.length;i++){
        const key = localStorage.key(i);
        data[key] = localStorage.getItem(key);
    }

    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "inventory-save.json";
    a.click();

    URL.revokeObjectURL(url);
}

function loadGame(event){

    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        try{
            const data = JSON.parse(e.target.result);

            localStorage.clear();

            for(const key in data){
                localStorage.setItem(key, data[key]);
            }

            draw();

        } catch(err){
            alert("Invalid file");
        }
    };

    reader.readAsText(file);
}

function resetAll(){
    if(confirm("Reset every item?")){
        localStorage.clear();
        draw();
    }
}

document.getElementById("search").addEventListener("input", draw);

updateMenuChecks();
draw();

</script>

</body>
</html>
