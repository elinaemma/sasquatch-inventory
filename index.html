<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sneaky Sasquatch Inventory</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#495e2d;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
    box-sizing:border-box;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2f2f2f;
    margin:8px auto;
    padding:10px;
    border-radius:12px;
    width:65%;
    box-sizing:border-box;
}

.controls{
    display:flex;
    align-items:center;
    gap:10px;
}

button{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.minus{
    background:#d9534f;
    color:white;
}

.plus{
    background:#5cb85c;
    color:white;
}

.count{
    width:30px;
    text-align:center;
    font-size:20px;
}

.reset{
    margin-top:30px;
    width:100%;
    height:50px;
    background:#444;
    color:white;
    font-size:18px;
}
</style>

</head>

<body>

<img src="sneaky.png" alt="Sneaky Sasquatch Inventory" class="title-image">

<input id="search" placeholder="Search...">

<div id="inventory"></div>

<button class="reset" onclick="resetAll()">Reset All</button>

<script>

const items = [
{ name:"Apple", emoji:"🍎" },
{ name:"Avocado Half", emoji:"🥑" },
{ name:"Banana", emoji:"🍌" },
{ name:"BBQ Sauce", emoji:"🍖" },
{ name:"Beef Jerky", emoji:"🥩" },
{ name:"Burger", emoji:"🍔" },
{ name:"Canned Pizza", emoji:"🍕" },
{ name:"Canned Soup", emoji:"🥫" },
{ name:"Candy", emoji:"🍬" },
{ name:"Chips/Crisps", emoji:"🥔" },
{ name:"Chocolate Milk", emoji:"🥛" },
{ name:"Frozen Waffles", emoji:"🧇" },
{ name:"Grape Soda", emoji:"🥤" },
{ name:"Hot Sauce", emoji:"🌶️" },
{ name:"Jam", emoji:"🍓" },
{ name:"Ketchup", emoji:"🍅" },
{ name:"Lemon", emoji:"🍋" },
{ name:"Lettuce/Cabbage", emoji:"🥬" },
{ name:"Lime", emoji:"🟢" },
{ name:"Milk", emoji:"🥛" },
{ name:"Mustard", emoji:"🟡" },
{ name:"Orange", emoji:"🍊" },
{ name:"Orange Juice", emoji:"🧃" },
{ name:"Orange Soda", emoji:"🥤" },
{ name:"Pretzels", emoji:"🥨" },
{ name:"Relish", emoji:"🥒" },
{ name:"S'more", emoji:"🍫🔥" },
{ name:"Sausage", emoji:"🌭" },
{ name:"Soy Sauce", emoji:"🥢" },
{ name:"Taco", emoji:"🌮" },
{ name:"Water Bottle", emoji:"💧" }
];

items.sort((a,b)=>a.name.localeCompare(b.name));

const inventory=document.getElementById("inventory");

function getCount(item){
    return Number(localStorage.getItem(item)||0);
}

function setCount(item,value){
    localStorage.setItem(item,value);
}

function draw(){

    inventory.innerHTML="";

    const filter=document.getElementById("search").value.toLowerCase();

    items.forEach(item=>{

        if(!item.name.toLowerCase().includes(filter)) return;

        const row=document.createElement("div");
        row.className="item";

        row.innerHTML=`
            <div>${item.emoji} ${item.name}</div>
            <div class="controls">
                <button class="minus">−</button>
                <div class="count">${getCount(item.name)}</div>
                <button class="plus">+</button>
            </div>
        `;

        row.querySelector(".minus").onclick=()=>{

            let value=Math.max(0,getCount(item.name)-1);
            setCount(item.name,value);
            draw();

        };

        row.querySelector(".plus").onclick=()=>{

            let value=getCount(item.name)+1;
            setCount(item.name,value);
            draw();

        };

        inventory.appendChild(row);

    });

}

function resetAll(){

    if(confirm("Reset every item?")){

        localStorage.clear();
        draw();

    }

}

document.getElementById("search").addEventListener("input",draw);

draw();

</script>

</body>
</html>
