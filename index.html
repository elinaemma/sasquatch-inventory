<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sneaky Sasquatch Inventory</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#1f1f1f;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
    box-sizing:border-box;
}

.category{
    margin-top:30px;
}

.category h2{
    border-bottom:2px solid #555;
    padding-bottom:5px;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#2f2f2f;
    margin:8px 0;
    padding:10px;
    border-radius:12px;
}

.controls{
    display:flex;
    align-items:center;
    gap:10px;
}

button{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.minus{
    background:#d9534f;
    color:white;
}

.plus{
    background:#5cb85c;
    color:white;
}

.count{
    width:30px;
    text-align:center;
    font-size:20px;
}

.reset{
    margin-top:30px;
    width:100%;
    height:50px;
    background:#444;
    color:white;
    font-size:18px;
}
</style>

</head>

<body>

<h1>Sneaky Sasquatch Inventory</h1>

<input id="search" placeholder="Search...">

<div id="inventory"></div>

<button class="reset" onclick="resetAll()">Reset All</button>

<script>

const categories = {

"Grocery Store":[
"Lemon",
"Orange",
"Lime",
"Apple",
"Banana",
"Lettuce/Cabbage",
"Canned Soup",
"Canned Pizza",
"Hot Sauce",
"Ketchup",
"Mustard",
"Relish",
"Jam",
"BBQ Sauce",
"Soy Sauce",
"Mayonnaise",
"Milk",
"Orange Juice",
"Frozen Waffles"
],

"Gas Station":[
"Pretzels",
"Beef Jerky",
"Chips/Crisps",
"Candy",
"Water Bottle",
"Orange Soda",
"Grape Soda",
"Chocolate Milk"
],

"Cafe":[
"Burger"
],

"Campsite":[
"S'more",
"Sausage",
"Avocado Half"
],

"Island Taco Truck":[
"Taco"
]

};

const inventory=document.getElementById("inventory");

function getCount(item){
    return Number(localStorage.getItem(item)||0);
}

function setCount(item,value){
    localStorage.setItem(item,value);
}

function draw(){

    inventory.innerHTML="";

    const filter=document.getElementById("search").value.toLowerCase();

    for(const category in categories){

        let section=document.createElement("div");
        section.className="category";

        let title=document.createElement("h2");
        title.innerText=category;
        section.appendChild(title);

        let visible=false;

        categories[category].forEach(item=>{

            if(!item.toLowerCase().includes(filter)) return;

            visible=true;

            const row=document.createElement("div");
            row.className="item";

            row.innerHTML=`
                <div>${item}</div>

                <div class="controls">

                    <button class="minus">−</button>

                    <div class="count">${getCount(item)}</div>

                    <button class="plus">+</button>

                </div>
            `;

            row.querySelector(".minus").onclick=()=>{

                let value=Math.max(0,getCount(item)-1);
                setCount(item,value);
                draw();

            }

            row.querySelector(".plus").onclick=()=>{

                let value=getCount(item)+1;
                setCount(item,value);
                draw();

            }

            section.appendChild(row);

        });

        if(visible)
            inventory.appendChild(section);

    }

}

function resetAll(){

    if(confirm("Reset every item?")){

        localStorage.clear();
        draw();

    }

}

document.getElementById("search").addEventListener("input",draw);

draw();

</script>

</body>
</html>
